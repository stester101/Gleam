<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#07293c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gleam">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2307293c'/%3E%3Crect x='38' y='34' width='104' height='104' rx='10' fill='none' stroke='%237fe3ff' stroke-width='7'/%3E%3Cpath d='M90 34v104M38 86h104' stroke='%237fe3ff' stroke-width='7'/%3E%3Cpath d='M52 118c14-10 28-16 40-34' stroke='%23fff' stroke-width='9' stroke-linecap='round' opacity='.85'/%3E%3C/svg%3E">
<title>Gleam — Window Cleaning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#04141f;--deep:#07293c;--mid:#0e4b68;
  --glass:rgba(255,255,255,.075);--glass-2:rgba(255,255,255,.12);--edge:rgba(255,255,255,.18);
  --text:#eef7fb;--dim:rgba(238,247,251,.58);--faint:rgba(238,247,251,.36);
  --aqua:#7fe3ff;--suds:#f5d67b;--clean:#5fe3b0;--dirt:#ff8f7a;
  --r:20px;--pad:16px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;touch-action:manipulation}
body{margin:0;background:var(--ink);color:var(--text);font-family:Inter,-apple-system,"Segoe UI",sans-serif;font-size:15px;line-height:1.45;overflow:hidden}
#app{position:relative;display:flex;flex-direction:column;width:100%;max-width:440px;min-width:0;height:100vh;height:100dvh;margin:0 auto;overflow:hidden;isolation:isolate;
  background:radial-gradient(120% 80% at 10% 0%, #10597e 0%, transparent 55%),
    radial-gradient(100% 70% at 100% 10%, #0d3f5c 0%, transparent 60%),
    linear-gradient(180deg,#07293c 0%,#04141f 70%)}
#app::before{content:'';position:absolute;inset:-30%;z-index:0;pointer-events:none;
  background:radial-gradient(closest-side,rgba(127,227,255,.20),transparent) 20% 25%/46% 46% no-repeat,
    radial-gradient(closest-side,rgba(95,227,176,.13),transparent) 85% 60%/50% 50% no-repeat,
    radial-gradient(closest-side,rgba(245,214,123,.10),transparent) 40% 95%/44% 44% no-repeat;
  filter:blur(10px);animation:drift 34s ease-in-out infinite alternate}
@keyframes drift{to{transform:translate3d(-4%,3%,0) scale(1.08)}}

.glass{position:relative;background:var(--glass);border:1px solid var(--edge);border-radius:var(--r);
  backdrop-filter:blur(22px) saturate(150%);-webkit-backdrop-filter:blur(22px) saturate(150%);
  box-shadow:0 10px 34px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.22)}
.glass::after{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(160deg,rgba(255,255,255,.14),transparent 38%)}

header{position:relative;z-index:3;flex:0 0 auto;padding:calc(env(safe-area-inset-top) + 14px) var(--pad) 10px}
.brandrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:baseline;gap:9px}
.brand h1{font-family:Archivo,Inter,sans-serif;font-weight:700;font-size:24px;letter-spacing:-.035em;margin:0;
  background:linear-gradient(100deg,#fff,var(--aqua));-webkit-background-clip:text;background-clip:text;color:transparent}
.brand small{font-size:10.5px;letter-spacing:.20em;text-transform:uppercase;color:var(--faint)}
.hbtns{display:flex;gap:8px}
.iconbtn{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:var(--glass);
  border:1px solid var(--edge);color:var(--text);backdrop-filter:blur(14px);cursor:pointer;font-size:16px}
.pagetitle{margin:14px 0 2px;font-family:Archivo,sans-serif;font-size:27px;letter-spacing:-.03em;font-weight:700}
.pagesub{color:var(--dim);font-size:13px;margin-bottom:12px}
.saved{font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.saved b{color:var(--clean);font-weight:600}

.rain{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:-1;opacity:.5}
.drop{position:absolute;top:-14px;width:2px;height:12px;border-radius:2px;
  background:linear-gradient(180deg,transparent,rgba(200,240,255,.85));animation:fall linear infinite}
@keyframes fall{to{transform:translateY(190px);opacity:0}}

main{position:relative;z-index:2;flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 var(--pad) calc(96px + env(safe-area-inset-bottom) + 20px);scroll-behavior:smooth}
.page{display:none;animation:wipein .45s cubic-bezier(.4,0,.2,1)}
.page.on{display:block}
@keyframes wipein{from{clip-path:inset(0 100% 0 0);opacity:.4}to{clip-path:inset(0 0 0 0);opacity:1}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.stat{padding:11px 12px;border-radius:16px}
.stat b{display:block;font-family:"JetBrains Mono",monospace;font-size:19px;font-weight:600;letter-spacing:-.02em}
.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.11em;color:var(--faint)}
.stat.owed b{color:var(--suds)} .stat.late b{color:var(--dirt)}

.card{position:relative;overflow:hidden;padding:14px;margin-bottom:10px;border-radius:18px}
.card .row1{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.addr{font-weight:600;font-size:15.5px;letter-spacing:-.01em}
.who{color:var(--dim);font-size:12.5px;margin-top:1px}
.price{font-family:"JetBrains Mono",monospace;font-weight:600;font-size:16px;white-space:nowrap}
.meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.chip{font-size:10.5px;letter-spacing:.04em;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);color:var(--dim)}
.chip.round{color:var(--aqua);border-color:rgba(127,227,255,.32)}
.chip.debt{color:var(--suds);border-color:rgba(245,214,123,.3)}
.chip.late{color:var(--dirt);border-color:rgba(255,143,122,.3)}
.chip.rise{color:var(--clean);border-color:rgba(95,227,176,.3)}
.chip.note{color:var(--text);border-color:rgba(255,255,255,.22)}
.acts{display:flex;gap:8px;margin-top:12px}
.btn{flex:1;padding:10px;border-radius:13px;border:1px solid var(--edge);background:var(--glass-2);color:var(--text);
  font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;transition:transform .12s,background .2s}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(120deg,rgba(127,227,255,.30),rgba(95,227,176,.22));border-color:rgba(127,227,255,.45)}
.btn.danger{background:rgba(255,143,122,.16);border-color:rgba(255,143,122,.4);color:#ffd9d1}
.btn.warn{background:rgba(245,214,123,.16);border-color:rgba(245,214,123,.42);color:#ffedc2}
.btn.paid{background:linear-gradient(120deg,rgba(95,227,176,.34),rgba(127,227,255,.18));border-color:rgba(95,227,176,.5)}
.btn.ghost{flex:0 0 auto;padding:10px 14px;color:var(--dim)}
.payask{margin-top:12px;animation:wipein .3s cubic-bezier(.4,0,.2,1)}
.payask .q{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--aqua);margin-bottom:8px;text-align:center}
.payask .acts{margin-top:8px}
.btn:focus-visible,.iconbtn:focus-visible,.tab:focus-visible{outline:2px solid var(--aqua);outline-offset:2px}

/* squeegee wipe — the signature */
.grime{position:absolute;inset:0;pointer-events:none;border-radius:inherit;opacity:0;
  background:radial-gradient(circle at 12% 30%,rgba(255,255,255,.30) 0 2px,transparent 3px),
    radial-gradient(circle at 28% 70%,rgba(255,255,255,.22) 0 3px,transparent 4px),
    radial-gradient(circle at 44% 22%,rgba(255,255,255,.26) 0 2px,transparent 3px),
    radial-gradient(circle at 61% 62%,rgba(255,255,255,.20) 0 3px,transparent 4px),
    radial-gradient(circle at 76% 34%,rgba(255,255,255,.28) 0 2px,transparent 3px),
    radial-gradient(circle at 90% 74%,rgba(255,255,255,.22) 0 3px,transparent 4px),
    linear-gradient(120deg,rgba(255,255,255,.05),transparent)}
.blade{position:absolute;top:-10%;bottom:-10%;left:0;width:16px;pointer-events:none;opacity:0;
  background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.9),rgba(127,227,255,.5),rgba(255,255,255,0));
  filter:blur(.4px);box-shadow:0 0 26px rgba(127,227,255,.65)}
.card.cleaning .grime{opacity:1;animation:wipeaway .72s cubic-bezier(.5,0,.2,1) forwards}
.card.cleaning .blade{opacity:1;animation:swipe .72s cubic-bezier(.5,0,.2,1) forwards}
.card.cleaning{animation:sparkle .72s ease forwards}
@keyframes wipeaway{from{clip-path:inset(0 0 0 0)}to{clip-path:inset(0 0 0 100%)}}
@keyframes swipe{from{transform:translateX(-16px)}to{transform:translateX(440px)}}
@keyframes sparkle{60%{border-color:rgba(127,227,255,.7)}100%{transform:scale(.96);opacity:0;margin-bottom:-10px;padding:0;height:0}}

/* spotlight + progress */
.card.spot{border-color:rgba(127,227,255,.4);box-shadow:0 12px 40px rgba(0,0,0,.36), 0 0 0 1px rgba(127,227,255,.12), inset 0 1px 0 rgba(255,255,255,.24)}
.card.spot .addr{font-size:18px}
.eyebrow{font-size:9.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--aqua);margin-bottom:6px}
.ringwrap{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:18px;margin-bottom:12px}
.ringwrap .txt{flex:1}
.ringwrap b{font-family:"JetBrains Mono",monospace;font-size:17px;display:block}
.ringwrap span{font-size:11px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase}
.ring{width:52px;height:52px;flex:0 0 auto;transform:rotate(-90deg)}
.ring circle{fill:none;stroke-width:5;stroke-linecap:round}
.ring .bg{stroke:rgba(255,255,255,.12)}
.ring .fg{stroke:var(--clean);transition:stroke-dashoffset .7s cubic-bezier(.2,.8,.2,1)}
.ringpct{position:absolute;font-size:10px;font-family:"JetBrains Mono",monospace}

.seg{display:flex;gap:4px;padding:4px;border-radius:14px;margin-bottom:14px;background:rgba(255,255,255,.06);border:1px solid var(--edge)}
.seg button{flex:1;padding:8px;border:0;border-radius:11px;background:transparent;color:var(--dim);font:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.seg button.on{background:var(--glass-2);color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
.seg.scroll{overflow-x:auto}
.seg.scroll button{flex:0 0 auto;padding:8px 12px}
.list{border-radius:18px;overflow:hidden}
.item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(255,255,255,.07);cursor:pointer}
.item:last-child{border-bottom:0}
.item:active{background:rgba(255,255,255,.05)}
.item .grow{flex:1;min-width:0}
.item .grow b{display:block;font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .grow span{font-size:12px;color:var(--dim);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.num{font-family:"JetBrains Mono",monospace;font-size:14px;font-weight:600;text-align:right;white-space:nowrap}
.num.owe{color:var(--suds)} .num.clear{color:var(--clean)} .num.bad{color:var(--dirt)}
.sect{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:20px 0 8px;display:flex;justify-content:space-between;align-items:center}
input,select,textarea{width:100%;padding:11px 12px;border-radius:13px;border:1px solid var(--edge);background:rgba(255,255,255,.07);
  color:var(--text);font:inherit;font-size:14px;margin-bottom:10px}
input::placeholder,textarea::placeholder{color:var(--faint)}
select option{background:#07293c}
label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:block;margin-bottom:5px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.heat{height:7px;border-radius:7px;background:rgba(255,255,255,.09);overflow:hidden;margin-top:6px}
.heat i{display:block;height:100%;border-radius:7px;background:linear-gradient(90deg,rgba(127,227,255,.85),rgba(95,227,176,.8))}
.bar{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar .lbl{width:96px;font-size:12px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .track{flex:1;height:9px;border-radius:9px;background:rgba(255,255,255,.08);overflow:hidden}
.bar .fill{height:100%;border-radius:9px;background:linear-gradient(90deg,rgba(127,227,255,.85),rgba(95,227,176,.75));transform-origin:left;animation:grow .7s cubic-bezier(.2,.8,.2,1)}
@keyframes grow{from{transform:scaleX(0)}}
.bar .val{width:56px;text-align:right;font-family:"JetBrains Mono",monospace;font-size:12.5px}

.tick{width:24px;height:24px;border-radius:8px;border:1px solid var(--edge);display:grid;place-items:center;font-size:12px;flex:0 0 auto}
.tick.on{background:linear-gradient(120deg,rgba(127,227,255,.5),rgba(95,227,176,.4));border-color:var(--aqua)}
.sent{color:var(--clean);font-size:11.5px;font-family:"JetBrains Mono",monospace}
.nonum{color:var(--dirt);font-size:11px}
.preview{padding:13px;border-radius:16px;font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:14px;
  background:rgba(127,227,255,.07);border:1px solid rgba(127,227,255,.2)}
.preview b{color:var(--text);font-weight:500}
.banner{padding:12px 14px;border-radius:16px;margin-bottom:12px;font-size:12.5px;color:var(--text);
  background:rgba(245,214,123,.10);border:1px solid rgba(245,214,123,.28);display:flex;gap:10px;align-items:center}
.banner button{margin-left:auto;background:none;border:0;color:var(--suds);font:inherit;font-weight:600;cursor:pointer;white-space:nowrap}

nav{position:absolute;left:12px;right:12px;bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:5;display:flex;padding:6px;border-radius:22px;
  background:rgba(10,40,58,.55);border:1px solid var(--edge);backdrop-filter:blur(26px) saturate(160%);-webkit-backdrop-filter:blur(26px) saturate(160%);
  box-shadow:0 14px 40px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.2)}
.tab{flex:1;border:0;background:transparent;color:var(--faint);font:inherit;font-size:9.5px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;padding:8px 2px 6px;border-radius:16px;cursor:pointer;display:grid;gap:3px;justify-items:center}
.tab i{font-style:normal;font-size:17px;filter:grayscale(1) opacity(.65)}
.tab.on{color:var(--text);background:rgba(255,255,255,.10)}
.tab.on i{filter:none}
.fab{position:absolute;right:16px;bottom:calc(env(safe-area-inset-bottom) + 88px);z-index:6;width:54px;height:54px;border-radius:50%;
  border:1px solid rgba(127,227,255,.5);cursor:pointer;background:linear-gradient(140deg,rgba(127,227,255,.45),rgba(95,227,176,.3));
  backdrop-filter:blur(18px);color:#fff;font-size:26px;line-height:1;box-shadow:0 10px 30px rgba(0,0,0,.4)}

.scrim{position:absolute;inset:0;z-index:7;background:rgba(2,12,20,.55);backdrop-filter:blur(3px);display:none}
.scrim.on{display:block}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:8;max-height:90%;overflow-y:auto;border-radius:26px 26px 0 0;
  padding:46px 16px calc(env(safe-area-inset-bottom) + 20px);background:rgba(9,44,64,.86);border:1px solid var(--edge);border-bottom:0;
  backdrop-filter:blur(30px) saturate(160%);transform:translateY(100%);transition:transform .32s cubic-bezier(.3,.9,.3,1)}
.sheet.on{transform:translateY(0)}
.handle{width:38px;height:4px;border-radius:4px;background:rgba(255,255,255,.28);margin:6px auto 14px}
.sheet h3{font-family:Archivo,sans-serif;font-size:20px;margin:0 0 2px;letter-spacing:-.02em}
.sheet .sub{color:var(--dim);font-size:12.5px;margin-bottom:14px}
.kv{display:flex;justify-content:space-between;gap:12px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:13.5px}
.kv span{color:var(--dim)}
.kv b{font-family:"JetBrains Mono",monospace;font-weight:600;text-align:right}
.tl{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12.5px}
.tl .d{font-family:"JetBrains Mono",monospace;color:var(--faint);flex:0 0 74px}
.tl .b{flex:1}
.tl .a{font-family:"JetBrains Mono",monospace}

.toast{position:absolute;left:50%;bottom:calc(env(safe-area-inset-bottom) + 92px);z-index:9;transform:translate(-50%,20px);opacity:0;pointer-events:none;
  transition:.25s;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:15px;font-size:13px;max-width:92%;
  background:rgba(9,44,64,.9);border:1px solid var(--edge);backdrop-filter:blur(20px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translate(-50%,0);pointer-events:auto}
.toast button{background:none;border:0;color:var(--aqua);font:inherit;font-weight:600;cursor:pointer;white-space:nowrap}
.empty{text-align:center;padding:44px 20px;color:var(--dim);font-size:13.5px}
.empty div{font-size:34px;margin-bottom:10px;opacity:.5}
.empty b{display:block;color:var(--text);font-weight:600;margin-bottom:4px}

/* ---- v3 additions ---- */
.titlerow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:8px 0 14px}
.titlerow .pagetitle{margin:0}
.rainbtn{flex:0 0 auto;padding:9px 13px;border-radius:13px;border:1px solid rgba(127,227,255,.34);background:var(--glass);color:var(--text);font:inherit;font-size:12.5px;font-weight:600;cursor:pointer;backdrop-filter:blur(14px)}
.progresshero{padding:15px 17px;border-radius:20px;margin-bottom:14px}
.prog-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.prog-count{font-family:"JetBrains Mono",monospace;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1}
.prog-count span{font-size:17px;color:var(--faint)}
.prog-top small{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.11em;display:block;margin-top:6px}
.prog-money{display:flex;gap:16px;text-align:right}
.prog-money b{font-family:"JetBrains Mono",monospace;font-size:17px;display:block;line-height:1.1}
.prog-money b.clean{color:var(--clean)} .prog-money b.suds{color:var(--suds)}
.prog-money span{font-size:9.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.09em}
.prog-bar{height:9px;border-radius:9px;background:rgba(255,255,255,.10);overflow:hidden}
.prog-bar i{display:block;height:100%;border-radius:9px;transition:width .6s cubic-bezier(.2,.8,.2,1);
  background:linear-gradient(90deg,rgba(127,227,255,.9),rgba(95,227,176,.85))}
.prog-rounds{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.earn{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 17px;border-radius:20px;margin-bottom:14px}
.earn .big{font-family:"JetBrains Mono",monospace;font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1}
.earn small{font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.11em;display:block;margin-top:6px}
.earn .done{text-align:right;font-size:12.5px;color:var(--dim);line-height:1.5}
.earn .done b{color:var(--clean);font-family:"JetBrains Mono",monospace;font-size:15px}
.cardtools{display:flex;gap:5px;flex:0 0 auto;align-items:center}
.cardtools button{width:29px;height:29px;border-radius:9px;border:1px solid var(--edge);background:var(--glass);color:var(--text);font-size:12px;cursor:pointer;display:grid;place-items:center;padding:0}
.cardtools button:disabled{opacity:.28}
.cal{padding:12px;border-radius:20px;margin-bottom:12px}
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.calhead b{font-family:Archivo,sans-serif;font-size:16px}
.grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;font-size:9px;color:var(--faint);padding-bottom:2px;text-transform:uppercase;letter-spacing:.05em}
.day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12.5px;cursor:pointer;border:1px solid transparent;color:var(--dim)}
.day.has{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:var(--text)}
.day.today{border-color:var(--aqua);color:var(--aqua)}
.day.sel{background:rgba(127,227,255,.24);border-color:var(--aqua);color:#fff}
.day .n{font-size:8px;font-family:"JetBrains Mono",monospace;color:var(--aqua);margin-top:1px}
.day.pale{opacity:.32}
.selrow{display:flex;gap:8px;margin-bottom:12px;align-items:stretch}
.selrow select,.selrow input{margin:0}
.hedit{display:flex;gap:6px;flex:0 0 auto}
.hedit button{width:27px;height:27px;border-radius:8px;border:1px solid var(--edge);background:var(--glass);color:var(--dim);font-size:11px;cursor:pointer;padding:0}
.txttype{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px}
.txttype button{flex:0 0 auto;padding:9px 14px;border-radius:13px;border:1px solid var(--edge);background:var(--glass);color:var(--dim);font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.txttype button.on{background:var(--glass-2);color:var(--text);border-color:rgba(127,227,255,.42)}
.sendbtn{flex:0 0 auto;padding:8px 13px;border-radius:11px;border:1px solid rgba(127,227,255,.42);background:linear-gradient(120deg,rgba(127,227,255,.3),rgba(95,227,176,.18));color:#fff;font:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.sendbtn.done{background:rgba(95,227,176,.14);border-color:rgba(95,227,176,.4);color:var(--clean)}

/* outdoor mode — same layout, brighter */
body.outdoor{font-size:16.5px}
body.outdoor #app{--text:#ffffff;--dim:rgba(255,255,255,.86);--faint:rgba(255,255,255,.72);
  --glass:rgba(255,255,255,.17);--glass-2:rgba(255,255,255,.26);--edge:rgba(255,255,255,.45);
  --aqua:#b7f0ff;--suds:#ffe28f;--clean:#8bffcd;--dirt:#ffb2a2;
  background:linear-gradient(180deg,#062132 0%,#010a11 70%)}
body.outdoor #app::before{opacity:.35}
body.outdoor .rain{display:none}
body.outdoor .btn{font-weight:600}

/* ---- v4 additions ---- */
input[type=date]{appearance:none;-webkit-appearance:none;width:100%;min-width:0}
.two>*{min-width:0}
select{min-width:0}
.grabber{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:4px;background:rgba(255,255,255,.28);z-index:2;pointer-events:none}
/* search UX */
.todaysearch{display:flex;gap:8px;align-items:stretch;margin-bottom:6px}
.searchwrap{position:relative;flex:1;min-width:0}
.searchwrap input{margin:0;padding-left:38px;padding-right:38px}
.searchwrap .si{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--faint);pointer-events:none}
.clearbtn{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:24px;height:24px;border-radius:50%;
  border:0;background:rgba(255,255,255,.16);color:var(--text);font-size:12px;cursor:pointer;display:grid;place-items:center;padding:0}
.addbtn{flex:0 0 auto;padding:0 14px;border-radius:13px;border:1px solid rgba(127,227,255,.45);
  background:linear-gradient(120deg,rgba(127,227,255,.30),rgba(95,227,176,.22));color:#fff;font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.restag{flex:0 0 auto;align-self:center;font-size:10px;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:999px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:var(--dim);cursor:pointer}
.restag.round{color:var(--aqua);border-color:rgba(127,227,255,.32)}
.restag.job{color:var(--clean);border-color:rgba(95,227,176,.36);font-weight:600}
.suggest{margin:2px 0 14px}
.suggest .lbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:0 0 8px 2px}
.suggestrow{display:flex;flex-wrap:wrap;gap:7px}
.suggestrow .chip{cursor:pointer}
.sheetclose{position:absolute;top:10px;right:12px;width:32px;height:32px;border-radius:11px;border:1px solid var(--edge);
  background:var(--glass);color:var(--text);font-size:14px;display:grid;place-items:center;cursor:pointer;z-index:2}
.citem{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:14px;background:var(--glass-2);
  border:1px solid var(--edge);margin-bottom:8px}
.citem.spot{border-color:rgba(127,227,255,.4)}
.citem .grow{flex:1;min-width:0;cursor:pointer}
.citem .grow b{display:block;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.citem .grow span{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tick{cursor:pointer}
@supports (-webkit-touch-callout:none){ #app{height:-webkit-fill-available} }
#app.wx-cloudy-day{filter:saturate(.92) brightness(.98)}
#app.wx-cloudy-night,#app.wx-clear-night,#app.wx-rain-night,#app.wx-fog-night,#app.wx-snow-night,#app.wx-storm-night{filter:brightness(.8) saturate(.9)}
#app.wx-rain-day .rain,#app.wx-rain-night .rain{opacity:.8}
#app.wx-storm-day,#app.wx-storm-night{filter:brightness(.72) contrast(1.06)}
#app.wx-fog-day,#app.wx-fog-night{filter:saturate(.55) brightness(.95)}
#app.wx-snow-day{filter:brightness(1.05) saturate(.82)}
@media (max-width:340px){ .stats{gap:6px} .stat{padding:9px 8px} .stat b{font-size:16px} }
.ccard{display:flex;gap:10px;align-items:stretch;padding:13px 14px;border-radius:16px;margin-bottom:9px;cursor:pointer}
.ccard-main{flex:1;min-width:0}
.ccard-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.ccard-name{min-width:0;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ccard-name b{font-weight:600;font-size:15px}
.ccard-head .num{flex:0 0 auto}
.ccard-addr{color:var(--dim);font-size:12.5px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ccard .meta{margin-top:9px}
.ccard-acts{display:flex;flex-direction:column;gap:6px;flex:0 0 auto;justify-content:center}
.ccard-acts .iconbtn{width:34px;height:34px;font-size:14px;text-decoration:none}
a.iconbtn{display:grid;place-items:center}
</style>

const Store={

  async init(){
    try{
      this.db=await new Promise((res,rej)=>{
        const r=indexedDB.open("gleam",1);
        r.onupgradeneeded=()=>r.result.createObjectStore("kv");
        r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error);
        setTimeout(()=>rej(new Error("timeout")),1500);
      });
      this.mode="IndexedDB"; return;
    }catch(e){}
    try{ localStorage.setItem("_g","1"); localStorage.removeItem("_g"); this.mode="localStorage"; return; }catch(e){}
    this.mode="memory";
  },
  async get(){
    try{
      if(this.mode==="IndexedDB") return await new Promise((res,rej)=>{
        const q=this.db.transaction("kv","readonly").objectStore("kv").get("state");
        q.onsuccess=()=>res(q.result||null); q.onerror=()=>rej(q.error);
      });
      if(this.mode==="localStorage"){ const v=localStorage.getItem("gleam"); return v?JSON.parse(v):null; }
    }catch(e){}
    return null;
  },
  async set(v){
    try{
      if(this.mode==="IndexedDB") return await new Promise((res,rej)=>{
        const q=this.db.transaction("kv","readwrite").objectStore("kv").put(v,"state");
        q.onsuccess=()=>res(); q.onerror=()=>rej(q.error);
      });
      if(this.mode==="localStorage") localStorage.setItem("gleam",JSON.stringify(v));
    }catch(e){ return false; }
    return true;
  }
};

const HLABEL={opening:"Opening balance",charge:"Clean charged",payment:"Payment",writeoff:"Written off",adjustment:"Adjustment",
  legacy_payment:"Payment (legacy)",legacy_writeoff:"Written off (legacy)",legacy_price:"Price change (legacy)",

function recalcBal(j){
  let b=0;
  (j.hist||[]).forEach(h=>{
    if(h.t==="opening"||h.t==="charge"||h.t==="adjustment") b+=(+h.a||0);
    else if(h.t==="payment"||h.t==="writeoff") b-=(+h.a||0);
  });
  j.bal=Math.round(b*100)/100;
}

/* BUG-01 + BUG-02 fix: advance from max(j.next, TODAY()), and always read/clear the keep-rhythm anchor */
function advanceNext(j){
  if(j.weeks<=0) return;
  const basis=(j.next && dt(j.next)>dt(TODAY()))?j.next:TODAY();
  if(j.anchor){
    let n=addD(j.anchor,j.weeks*7);
    while(dt(n)<=dt(TODAY())) n=addD(n,j.weeks*7);
    j.next=n; j.anchor=null;
  }else{
    j.next=addD(basis,j.weeks*7);
  }
}

function clearBacklog(jobs){
  const today=TODAY();
  jobs.forEach(j=>{
    if(j.status!=="active"||j.weeks<=0||!j.next||dt(j.next)>dt(today)) return;
    const origin=j.next;
    if(j.price>0){ j.hist.push({id:"h"+Date.now()+Math.random(),d:origin,t:"charge",a:j.price,n:"Not paid (backlog)"}); }
    j.hist.push({id:"h"+Date.now()+Math.random(),d:origin,t:"done",a:j.price,n:"Not paid"});
    recalcBal(j); if(j.bal>0) j.bd=origin;
    j.last=origin;
    let n=origin, guard=0;
    while(dt(n)<=dt(today)&&guard++<200) n=addD(n,j.weeks*7);
    j.next=n;
  });
}

/* migrate an old-shape save (jobs.round string, flat bal, old hist types) into the new ledger + rounds-registry shape */
function migrateState(v){
  if(!v.settings) v.settings=JSON.parse(JSON.stringify(DEFAULTS.settings));
  if(!v.meta) v.meta={...DEFAULTS.meta};
  if(v.rounds && v.jobs.length && v.jobs[0].roundId!==undefined){
    v.jobs.forEach(j=>{ if(!j.hist) j.hist=[]; recalcBal(j); });
    if(!v.dayOrders) v.dayOrders={};
    return v;
  }
  v.rounds=v.rounds||[];
  const roundIdFor={};
  const ensure=name=>{
    name=(name||"Unassigned").trim()||"Unassigned";
    if(roundIdFor[name]) return roundIdFor[name];
    let existing=v.rounds.find(r=>r.name===name);
    if(!existing){ existing={id:"r"+(v.rounds.length+1),name,order:v.rounds.length+1}; v.rounds.push(existing); }
    roundIdFor[name]=existing.id; return existing.id;
  };
  v.jobs.forEach(j=>{
    j.roundId=ensure(j.round||"Unassigned");
    delete j.round;
    const oldBal=+j.bal||0;
    const oldHist=(j.hist||[]).map(h=>{
      if(h.t==="pay") return {...h,t:"legacy_payment"};
      if(h.t==="writeoff") return {...h,t:"legacy_writeoff"};
      if(h.t==="price") return {...h,t:"legacy_price"};
      return h;
    });
    j.hist=oldBal?[{id:"h"+Date.now()+Math.random(),d:j.bd||TODAY(),t:"opening",a:oldBal,n:"Opening balance (migrated)"},...oldHist]:oldHist;
    recalcBal(j);
    j.bd=j.bal>0?(j.bd||TODAY()):"";
  });
  v.dayOrders=v.dayOrders||{};
  return v;
}

/* projection for schedule view — first visit is max(next, today) */
function projection(days){
  const start=TODAY(), end=addD(start,days-1), map={};
  activeJobs().filter(j=>j.weeks>0&&j.next).forEach(j=>{
    let d=dt(j.next)<dt(start)?start:j.next, guard=0;
    while(dt(d)<=dt(end)&&guard++<60){
      (map[d]=map[d]||[]).push(j);
      d=addD(d,j.weeks*7);
    }
  });
  Object.values(map).forEach(a=>a.sort((x,y)=>roundName(x).localeCompare(roundName(y))||x.seq-y.seq));
  return map;
}

  const map=projection(90); const byDay={};

  for(let dd=1;dd<=dim;dd++){

        <div class="grow"><b>${esc(j.addr)}</b><span>${esc(roundName(j))} · ${freqLabel(j.weeks)}</span></div>
        <div class="num">${fmt(j.price)}</div></div>`).join("")}</div>

    :`<div class="preview">Tap a highlighted day to see what's on. Numbers show how many jobs fall on each date.</div>`}`;

/* ---- CUSTOMERS ---- */
function custMatches(){
  const q=UI.custQ.toLowerCase().trim();
  let js=S.jobs.filter(j=>!q||(j.name+" "+j.addr+" "+roundName(j)+" "+j.ph).toLowerCase().includes(q));
  const F=UI.custFilter;
  if(F==="all") js=js.filter(isActive);
  if(F==="overdue") js=js.filter(j=>isActive(j)&&overdue(j));
  if(F==="owing") js=js.filter(j=>isActive(j)&&j.bal>0);
  if(F==="credit") js=js.filter(j=>isActive(j)&&j.bal<0);
  if(F==="nophone") js=js.filter(j=>isActive(j)&&!j.ph);
  if(F==="off") js=js.filter(j=>!isActive(j));
  if(UI.custRound!=="all") js=js.filter(j=>j.roundId===UI.custRound);
  const sort=UI.custSort;
  js.sort((a,b)=>{
    if(sort==="name") return nameOf(a).localeCompare(nameOf(b));
    if(sort==="balance") return b.bal-a.bal;
    if(sort==="next") return (a.next||"9999").localeCompare(b.next||"9999");
    if(sort==="overdue") return (overdue(b)?1:0)-(overdue(a)?1:0) || (a.next||"9999").localeCompare(b.next||"9999");
    return roundName(a).localeCompare(roundName(b))||a.seq-b.seq||a.addr.localeCompare(b.addr);
  });
  return js;
}

          ${!j.ph?`<span class="chip late">No number</span>`:""}

function renderDebts(){ const el=$("debtResults"); if(el) el.innerHTML=debtListHTML(UI.moneyTab==="credit"?"credit":UI.moneyTab==="stale"?"stale":"owed"); }
function debtListHTML(mode){
  const q=UI.moneyQ.toLowerCase().trim();
  let js=activeJobs().filter(j=>{
    if(mode==="stale") return isStale(j);
    if(mode==="credit") return j.bal<0;
    return j.bal>0&&!isStale(j);
  });
  if(q) js=js.filter(j=>(j.name+" "+j.addr+" "+roundName(j)).toLowerCase().includes(q));
  if(mode==="owed" && UI.moneyRound!=="all") js=js.filter(j=>j.roundId===UI.moneyRound);
  const sort=mode==="owed"?UI.moneySort:"owed-desc";
  js.sort((a,b)=>{
    if(sort==="owed-asc") return a.bal-b.bal;
    if(sort==="name") return nameOf(a).localeCompare(nameOf(b));
    if(sort==="round") return roundName(a).localeCompare(roundName(b))||b.bal-a.bal;
    if(sort==="oldest") return (a.bd||"9999")<(b.bd||"9999")?-1:1;
    return Math.abs(b.bal)-Math.abs(a.bal);
  });
  if(!js.length) return `<div class="empty"><div>${mode==="stale"?"🗃":mode==="credit"?"💳":"✅"}</div><b>${mode==="stale"?"No stale debts":mode==="credit"?"Nobody in credit":"Nothing outstanding"}</b>${mode==="stale"?"Anything older than 12 months lands here.":mode==="credit"?"No one has overpaid.":"Everyone's square with you."}</div>`;
  return `${mode==="stale"?`<div class="preview">Balances untouched for over 12 months — kept out of the live figure. Write one off and it's logged.</div>`:""}
  <div class="list glass">${js.map(j=>`<div class="item">
    <div class="grow" onclick="jobSheet('${j.id}')"><b>${esc(nameOf(j))}</b><span>${esc(j.addr)} · ${esc(roundName(j))}${j.bd?" · since "+uk(j.bd):""}</span></div>
    <div class="num ${j.bal<0?"clear":"owe"}">${j.bal<0?fmt(-j.bal)+" in credit":fmt(j.bal)}</div>
    ${j.bal>0?`<button class="iconbtn" style="width:34px;height:34px;font-size:13px" onclick="paySheet('${j.id}')">£</button>`:""}
    ${j.ph&&j.bal>0?`<button class="iconbtn" style="width:34px;height:34px;font-size:13px" onclick="sms('${j.id}','chase')">✉</button>`:""}
    ${mode==="stale"?`<button class="iconbtn" style="width:34px;height:34px;font-size:13px" onclick="writeOff('${j.id}')">✕</button>`:""}
  </div>`).join("")}</div>`;
}
function collectedIn(days,offset){
  offset=offset||0;
  const from=addD(TODAY(),-(days+offset)+1), to=addD(TODAY(),-offset);
  return S.jobs.reduce((s,j)=>s+j.hist.filter(h=>h.t==="payment"&&h.d>=from&&h.d<=to).reduce((a,b)=>a+b.a,0),0);
}
function plannedIn(days){
  const map=projection(days);
  return Object.values(map).flat().reduce((s,j)=>s+j.price,0);
}
function overview(){
  const rs=roundsSorted().map(r=>({name:r.name,val:jobsInRound(r.id).filter(isActive).reduce((s,j)=>s+Math.max(0,j.bal),0)})).filter(x=>x.val>0).sort((a,b)=>b.val-a.val);
  const prices=activeJobs().filter(j=>j.price>0).map(j=>j.price);
  const avg=prices.reduce((a,b)=>a+b,0)/(prices.length||1);
  const noPrice=activeJobs().filter(j=>!j.price).length;
  const monthStart=TODAY().slice(0,8)+"01";
  const month=S.jobs.reduce((s,j)=>s+j.hist.filter(h=>h.t==="payment"&&h.d>=monthStart).reduce((a,b)=>a+b.a,0),0);
  return `<div class="sect">Collected vs planned</div>
    <div class="list glass">
      <div class="item"><div class="grow"><b>This week</b><span>Last 7 days</span></div><div class="num clear">${fmt(collectedIn(7))}</div></div>
      <div class="item"><div class="grow"><b>Last week</b><span>The 7 days before</span></div><div class="num">${fmt(collectedIn(7,7))}</div></div>
      <div class="item"><div class="grow"><b>This month</b><span>Since ${uk(monthStart)}</span></div><div class="num clear">${fmt(month)}</div></div>
      <div class="item"><div class="grow"><b>Planned, next 4 weeks</b><span>From the schedule</span></div><div class="num owe">${fmt(plannedIn(28))}</div></div>
    </div>
    ${rs.length?`<div class="sect">Debt by round</div>
      ${rs.map(x=>`<div class="bar"><div class="lbl">${esc(x.name)}</div>
        <div class="track"><div class="fill" style="width:${x.val/rs[0].val*100}%"></div></div>
        <div class="val">${fmt(Math.round(x.val))}</div></div>`).join("")}`:""}
    <div class="sect">Health check</div>
    <div class="list glass">
      <div class="item"><div class="grow"><b>Average job price</b><span>Across priced jobs</span></div><div class="num">${fmt(avg.toFixed(2))}</div></div>
      <div class="item" onclick="UI.custFilter='all';UI.custQ='';go('customers')"><div class="grow"><b>Jobs with no price</b><span>Quote them next visit</span></div><div class="num ${noPrice?"bad":""}">${noPrice}</div></div>
      <div class="item"><div class="grow"><b>Debts over £200</b><span>Worth a phone call</span></div><div class="num owe">${activeJobs().filter(j=>j.bal>200).length}</div></div>
      <div class="item"><div class="grow"><b>On request jobs</b><span>Not on a schedule</span></div><div class="num">${activeJobs().filter(j=>!j.weeks).length}</div></div>
    </div>`;
}

const TXTYPES=[["remind","Reminder"],["onway","On my way"],["done","Windows done"],["chase","Debt chaser"]];
function txRecipients(){
  const type=UI.txType;
  let js;
  if(type==="chase") js=activeJobs().filter(j=>j.bal>0);
  else if(type==="remind"){
    js=activeJobs().filter(j=>j.weeks>0&&j.next&&dt(j.next)>=dt(TODAY()));
    if(UI.txDate) js=js.filter(j=>j.next===UI.txDate);
  } else js=dueToday();
  if(UI.txRound!=="all") js=js.filter(j=>j.roundId===UI.txRound);
  if(UI.txHasNumber==="yes") js=js.filter(j=>j.ph);
  if(UI.txHasNumber==="no") js=js.filter(j=>!j.ph);
  return js.sort((a,b)=>roundName(a).localeCompare(roundName(b))||a.seq-b.seq);
}

      ${[["all","Everyone"],["yes","Has number"],["no","No number"]].map(([k,l])=>

function markAllSent(){

function fill(t,j,date){
  return t.replace(/{name}/g,j.name||"there").replace(/{address}/g,j.addr||"")
    .replace(/{price}/g,j.price?fmt(j.price):"the usual").replace(/{balance}/g,fmt(j.bal||0))
    .replace(/{date}/g,date?shortD(date):shortD(TODAY())).replace(/{biz}/g,S.settings.biz).replace(/{pay}/g,S.settings.payDetails);

function sms(id,kind){
  const j=S.jobs.find(x=>x.id===id); if(!j) return;

  const body=encodeURIComponent(fill(S.settings.tpl[kind],j,j.next));

  const j=S.jobs.find(x=>x.id===id);

/* ================= ACTIONS ================= */
function finishDone(id,status,amt){
  const j=S.jobs.find(x=>x.id===id); if(!j) return;
  let paid = status==="full" ? j.price : status==="part" ? amt : 0;
  const el=$("c"+id);
  const apply=()=>{
    snap();
    j.last=TODAY();
    advanceNext(j);
    if(j.price>0) log(j,"charge",j.price,"Clean");
    log(j,"done",j.price,status==="full"?"Paid in full":status==="part"?"Part paid "+fmt(paid):j.price?"Not paid":"Done");
    if(paid>0) log(j,"payment",paid,status==="full"?"Paid in full":"Part payment");
    recalcBal(j);
    j.bd=j.bal>0?TODAY():"";
    save(); render();
    const msg = status==="none" && j.price ? fmt(j.price)+" added to their bill"
      : paid>0 ? fmt(paid)+" taken" : "logged";
    toast("Cleaned · "+msg,"Undo",undo);
  };
  if(el){ el.classList.add("cleaning"); setTimeout(apply,700); } else apply();
}
function partPay(id){
  const j=S.jobs.find(x=>x.id===id);
  sheet(`<h3>Part payment</h3><div class="sub">${esc(nameOf(j))} · full price ${fmt(j.price)}</div>
    <label>How much did they hand over?</label>
    <input id="partAmt" type="number" step="0.01" inputmode="decimal" placeholder="e.g. 10" autofocus>
    <div class="preview">The rest goes onto their balance and the job's marked cleaned.</div>
    <button class="btn primary" style="width:100%" onclick="confirmPart('${id}')">Record and mark done</button>`);
}
function confirmPart(id){

  closeSheet(); finishDone(id,"part",amt);
}
function skipSheet(id){

  const apply=()=>{

function rainDay(){

function delHist(id,idx){
  const j=S.jobs.find(x=>x.id===id), h=j.hist[idx]; if(!h) return;
  const doneEntries=j.hist.filter(x=>x.t==="done").sort((a,b)=>a.d<b.d?-1:1);
  const isLatestDone=h.t==="done" && doneEntries.length && doneEntries[doneEntries.length-1]===h;
  sheet(`<h3>Delete this entry?</h3><div class="sub">${uk(h.d)} · ${HLABEL[h.t]||h.t}${h.a?" · "+fmt(h.a):""}</div>
    <div class="preview">${["payment","writeoff","opening","charge","adjustment"].includes(h.t)?"The balance is recalculated from what's left in the ledger.":"The log entry is removed."}</div>
    ${isLatestDone&&j.weeks>0?`<div class="preview" style="background:rgba(245,214,123,.08);border-color:rgba(245,214,123,.22)">This is the most recent clean. You can roll the schedule back one cycle so next due reflects that it wasn't actually done.</div>
    <div class="acts"><button class="btn danger" onclick="doDelHist('${id}',${idx},true)">Delete and roll schedule back</button>
      <button class="btn" onclick="doDelHist('${id}',${idx},false)">Delete, keep schedule</button></div>`
    :`<div class="acts"><button class="btn danger" onclick="doDelHist('${id}',${idx},false)">Delete entry</button></div>`}
    <div class="acts" style="margin-top:6px"><button class="btn ghost" style="width:100%" onclick="jobSheet('${id}')">Cancel</button></div>`);
}
function doDelHist(id,idx,rollback){
  snap(); const j=S.jobs.find(x=>x.id===id), h=j.hist[idx]; if(!h) return;
  j.hist.splice(idx,1);

/* ================= WEATHER (Deal, Kent — the only network call, degrades silently) ================= */
const WEATHER_CACHE_MS=45*60*1000;
async function fetchWeather(){
  if(!S.settings.weatherOn) return;
  const cache=S.weather;
  if(cache && cache.at && (Date.now()-cache.at)<WEATHER_CACHE_MS){ applyWeatherClass(cache.code,cache.isDay); return; }
  try{
    const res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=51.2226&longitude=1.4012&current=weather_code,is_day");
    if(!res.ok) throw new Error("bad response");
    const data=await res.json();
    const code=data.current.weather_code, isDay=data.current.is_day;
    S.weather={code,isDay,at:Date.now()};
    save();
    applyWeatherClass(code,isDay);
  }catch(e){
    if(cache) applyWeatherClass(cache.code,cache.isDay);
  }
}
function weatherClassFor(code,isDay){
  let base="clear";
  if(code===0||code===1) base="clear";
  else if(code===2||code===3) base="cloudy";
  else if([45,48].includes(code)) base="fog";
  else if(code>=51&&code<=67) base="rain";
  else if(code>=71&&code<=77) base="snow";
  else if(code>=80&&code<=82) base="rain";
  else if(code>=95) base="storm";
  return "wx-"+base+"-"+(isDay?"day":"night");
}
function applyWeatherClass(code,isDay){
  const app=$("app"); if(!app) return;
  app.className=app.className.replace(/\bwx-\S+/g,"").trim();
  if(!S.settings.weatherOn||code==null) return;
  app.classList.add(weatherClassFor(code,isDay));
  const rainEl=$("rain");
  if(rainEl) rainEl.style.display=(code>=51&&code<=82)?"":"none";
}
function toggleWeather(){
  S.settings.weatherOn=!S.settings.weatherOn; save(); openSettings("data");

  save(); openSettings(); toast(w+" weekly added");
}

/* ---- CSV ---- */
function parseCSV(text){
  const rows=[]; let f="",row=[],q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){f+='"';i++;} else q=false; } else f+=c; }
    else if(c==='"') q=true;
    else if(c===","){ row.push(f); f=""; }
    else if(c==="\n"){ row.push(f); rows.push(row); row=[]; f=""; }
    else if(c!=="\r") f+=c;
  }
  if(f.length||row.length){ row.push(f); rows.push(row); }
  return rows.filter(r=>r.some(c=>c.trim()!==""));
}
function importCSV(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    let added=0,updated=0,unchanged=0,skipped=0;
    try{
      const rows=parseCSV(r.result);
      const head=rows.shift().map(h=>h.trim());
      const c=n=>head.indexOf(n);
      const iId=c("Aworka Job ID");
      if(iId<0){ toast("That doesn't look like an Aworka export"); return; }
      snap();
      rows.forEach(row=>{
        const jid=+row[iId]; if(!jid){ skipped++; return; }
        const g=n=>{ const i=c(n); return i<0?"":String(row[i]||"").trim(); };
        const freqTxt=g("Frequency");
        const m=freqTxt.match(/(\d+)\s*weekly/i);
        const weeks=m?+m[1]:0;
        const balRaw=parseFloat(g("Balance"))||0;
        const openingBal=-balRaw; // Aworka convention: negative = owes
        const roundNameRaw=(g("Round")||"Unassigned").replace(/^Ben\s+/,"");
        const roundId=ensureRound(roundNameRaw).id;
        const inc={
          name:g("Customer Name"), addr:g("Job Address")||g("Customer Address"),
          pc:g("Job Postcode")||g("Customer Postcode"),
          ph:g("Customer Phone 1")||g("Customer Phone 2")||g("Job Phone 1"),
          email:g("Customer Email"), roundId,
          seq:+g("Seq Round Index")||99, price:parseFloat(g("Price"))||0, weeks,
          next:g("Next Due"), last:g("Last Done/Skipped"),
          bd:g("Balance Date"), ps:g("Price Since"), notes:g("Notes")||g("Customer Notes"),
          status:(g("Status")||"Active").toLowerCase()==="active"?"active":"archived"
        };
        if(!inc.addr){ skipped++; return; }
        const ex=S.jobs.find(j=>j.jid===jid);
        if(!ex){
          const nj={id:"j"+jid,jid,ph2:"",pay:"Cash",mins:S.settings.mins,hist:[],...inc,bal:0};
          if(openingBal) nj.hist.push({id:"h"+jid,d:nj.bd||TODAY(),t:"opening",a:openingBal,n:"Opening balance (CSV import)"});
          recalcBal(nj); nj.bd=nj.bal>0?(nj.bd||TODAY()):"";
          S.jobs.push(nj);
          added++;
        }else{
          let changed=false;
          ["seq","price","weeks"].forEach(k=>{ if(+ex[k]!==+inc[k]){ ex[k]=inc[k]; changed=true; } });
          ["name","addr","pc","ph","email","notes","status"].forEach(k=>{
            if(inc[k] && String(ex[k]||"")!==String(inc[k])){ ex[k]=inc[k]; changed=true; }
          });
          if(inc.next && ex.next!==inc.next){ ex.next=inc.next; changed=true; }
          if(inc.last && ex.last!==inc.last){ ex.last=inc.last; changed=true; }
          if(ex.roundId!==roundId){ ex.roundId=roundId; changed=true; }
          const delta=Math.round((openingBal-ex.bal)*100)/100;
          if(delta!==0){ log(ex,"adjustment",delta,"CSV import adjustment"); recalcBal(ex); ex.bd=ex.bal>0?TODAY():""; changed=true; }
          changed?updated++:unchanged++;
        }
      });
      resequenceMissing();
      save(); render();
      sheet(`<h3>Import finished</h3><div class="sub">${file.name}</div>
        <div class="kv"><span>Added</span><b style="color:var(--clean)">${added}</b></div>
        <div class="kv"><span>Updated</span><b style="color:var(--aqua)">${updated}</b></div>
        <div class="kv"><span>Unchanged</span><b>${unchanged}</b></div>
        <div class="kv"><span>Skipped (no ID or address)</span><b>${skipped}</b></div>
        <div class="preview" style="margin-top:14px">${added+updated===0?"No changes — every row already matched what's in Gleam.":"History and payments were kept for every existing job."}</div>
        <div class="acts"><button class="btn primary" onclick="closeSheet()">Done</button>
          <button class="btn ghost" onclick="undo();closeSheet()">Undo import</button></div>`);
    }catch(e){
      toast("Couldn't read that file — is it the Aworka CSV?");
    }
    input.value="";
  };
  r.readAsText(file);
}
function resequenceMissing(){
  const by={};
  S.jobs.forEach(j=>{ if(!j.seq||j.seq===99){ by[j.roundId]=(by[j.roundId]||activeJobs().filter(x=>x.roundId===j.roundId).length); j.seq=++by[j.roundId]; } });
}
function exportCSV(){
  const cols=CSV_HEAD.split(",");
  const q=v=>{ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; };
  const lines=[CSV_HEAD];
  S.jobs.forEach(j=>{
    const m={"Customer Name":j.name,"Customer Address":j.addr,"Customer Postcode":j.pc,"Customer Phone 1":j.ph,
      "Customer Phone 2":j.ph2,"Customer Email":j.email,"Payment Method":j.pay,"Balance":j.bal?-j.bal:"",
      "Balance Date":j.bd,"User":S.settings.owner,"Round":roundName(j),"Seq Round Index":j.seq,"Job Address":j.addr,
      "Job Postcode":j.pc,"Notes":j.notes,"Price":j.price?j.price.toFixed(2):"","Frequency":j.weeks?j.weeks+" weekly":"On Request",
      "Time Required":String(Math.floor(j.mins/60)).padStart(2,"0")+":"+String(j.mins%60).padStart(2,"0"),
      "Status":j.status==="active"?"Active":"Inactive","Last Done/Skipped":j.last,"Next Due":j.next,
      "Price Since":j.ps,"Aworka Job ID":j.jid||""};
    lines.push(cols.map(c=>q(m[c]!==undefined?m[c]:"")).join(","));
  });
  download(lines.join("\n"),"gleam-export-"+TODAY()+".csv","text/csv");
  markExported();
}
function exportJSON(){
  download(JSON.stringify(S,null,1),"gleam-backup-"+TODAY()+".json","application/json");
  markExported();
}
function markExported(){ S.meta.lastExport=new Date().toISOString(); save(); render(); toast("Backed up"); }
function importJSON(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const v=JSON.parse(r.result);
      if(!v.jobs||!Array.isArray(v.jobs)) throw new Error("bad");
      snap();
      S=migrateState(v);
      save(); closeSheet(); render();
      document.body.classList.toggle("outdoor",!!S.settings.outdoor);
      toast("Restored "+S.jobs.length+" jobs");
    }catch(e){ toast("That file isn't a Gleam backup"); }
    input.value="";
  };
  r.readAsText(file);
}
function download(text,name,type){
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([text],{type}));
  a.download=name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },1000);
}

/* ================= CHROME ================= */
function sheet(html){
  $("sheet").innerHTML=`<div class="grabber" aria-hidden="true"></div><button class="sheetclose" onclick="closeSheet()" aria-label="Close">✕</button>${html}`;
  $("sheet").style.transform=""; $("sheet").scrollTop=0;
  $("sheet").classList.add("on"); $("scrim").classList.add("on");
}
function closeSheet(){ $("sheet").classList.remove("on"); $("scrim").classList.remove("on"); $("sheet").style.transform=""; }
function setupSheetSwipe(){
  const sh=$("sheet");
  let startY=null, dragging=false;
  const interactive=el=>!!(el&&el.closest&&el.closest("input,select,textarea,button,a,.list,.seg,.txttype,.two"));
  sh.addEventListener("pointerdown",e=>{
    // only begin a dismiss-drag from the very top grab zone of the sheet, and never on a control
    if(sh.scrollTop>2) return;
    if(interactive(e.target)) return;
    const rect=sh.getBoundingClientRect();
    if(e.clientY-rect.top>72) return;           // grab handle area only
    startY=e.clientY; dragging=true; sh.style.transition="none";
  });
  sh.addEventListener("pointermove",e=>{
    if(!dragging||startY==null) return;
    const dy=e.clientY-startY;
    if(dy>0){ sh.style.transform="translateY("+dy+"px)"; e.preventDefault(); }
  });
  function end(e){
    if(!dragging) return;
    dragging=false; sh.style.transition="";
    const dy=(e.clientY!=null?e.clientY:startY)-startY;
    if(dy>90) closeSheet(); else sh.style.transform="";
    startY=null;
  }
  sh.addEventListener("pointerup",end);
  sh.addEventListener("pointercancel",end);
}
let toastT;
function toast(msg,action,fn){
  $("toastMsg").textContent=msg;
  const b=$("toastAct"); b.textContent=action||""; b.style.display=action?"block":"none";
  b.onclick=()=>{ if(fn) fn(); $("toast").classList.remove("on"); };
  $("toast").classList.add("on"); clearTimeout(toastT);
  toastT=setTimeout(()=>$("toast").classList.remove("on"),3600);
}
function go(p){ document.querySelector('.tab[data-p="'+p+'"]').click(); }
document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("on")); t.classList.add("on");
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("on"));
  const p=$("p-"+t.dataset.p); p.classList.add("on"); p.style.animation="none"; p.offsetHeight; p.style.animation="";
  $("main").scrollTop=0;
});
(function rain(){ const r=$("rain"); for(let i=0;i<14;i++){ const d=document.createElement("div"); d.className="drop";
  d.style.left=Math.random()*100+"%"; d.style.animationDuration=(1.6+Math.random()*2.6)+"s";
  d.style.animationDelay=(Math.random()*4)+"s"; d.style.opacity=.2+Math.random()*.6; r.appendChild(d); } })();

/* boot */
(async function boot(){
  await Store.init();
  const stored=await Store.get();
  S=stored&&stored.jobs&&stored.jobs.length?migrateState(stored):seed();
  if(!S.settings) S.settings=JSON.parse(JSON.stringify(DEFAULTS.settings));
  if(!S.meta) S.meta={...DEFAULTS.meta};
  if(S.settings.weatherOn===undefined) S.settings.weatherOn=true;
  if(S.settings.compactToday===undefined) S.settings.compactToday=false;
  S.settings.freqs=S.settings.freqs||[4,5,8,0];
  Object.keys(DEFAULTS.settings.tpl).forEach(k=>{ if(!S.settings.tpl[k]) S.settings.tpl[k]=DEFAULTS.settings.tpl[k]; });
  if(!S.rounds) S.rounds=[];
  if(!S.dayOrders) S.dayOrders={};
  recalcAll();
  document.body.classList.toggle("outdoor",!!S.settings.outdoor);
  $("sunBtn").textContent=S.settings.outdoor?"🌙":"☀";
  $("bizname").textContent=S.settings.owner;
  render();
  setupSheetSwipe();
  if(S.settings.weatherOn) fetchWeather();
  if(!stored) save();
})();
